name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    if: github.repository == 'maxxuxx/ts-utils'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify exports
        run: npm run verify:exports

      - name: Verify package
        run: npm run verify:pack

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Audit all dependencies
        run: npm audit

      - name: Check published version
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";
          import { spawnSync } from "node:child_process";

          const packageJson = JSON.parse(readFileSync("package.json", "utf8"));
          const specifier   = `${packageJson.name}@${packageJson.version}`;
          const npmCommand  = process.platform === "win32" ? "npm.cmd" : "npm";
          const result = spawnSync(
            npmCommand,
            ["view", specifier, "version", "--json"],
            { encoding: "utf8" }
          );

          if (result.error) {
            console.error(`[publish] registry lookup failed for ${specifier}`, result.error);
            process.exit(1);
          }

          if (result.status === 0) {
            console.error(`[publish] ${specifier} already exists`);
            process.exit(1);
          }

          const registryOutput = `${result.stdout}\n${result.stderr}`;

          if (!/\bE404\b/u.test(registryOutput)) {
            console.error(`[publish] registry lookup failed for ${specifier}`);
            console.error(registryOutput.trim());
            process.exit(result.status ?? 1);
          }

          console.log(`[publish] ${specifier} is available`);
          NODE

      - name: Publish to npm
        run: npm publish --access public
