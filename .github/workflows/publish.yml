name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    if: github.repository == 'maxxuxx/ts-utils'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify exports
        run: npm run verify:exports

      - name: Verify package
        run: npm run verify:pack

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Audit all dependencies
        run: npm audit

      - name: Check published version
        run: npm run check:publish-version

      - name: Publish to npm
        run: npm publish --access public
